name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: devsecops-app

jobs:
  # Stage 1: Code Quality
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run flake8 (linting)
        run: flake8 src/ tests/ --max-line-length=120 --statistics

      - name: Run black (formatting check)
        run: black --check src/ tests/

      - name: Run isort (import sorting check)
        run: isort --check-only src/ tests/

  # Stage 2: Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-report=html --junitxml=test-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  # Stage 3: SAST - Static Application Security Testing
  sast-scan:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit SAST scan
        run: |
          bandit -r src/ -f json -o security/bandit-report.json --severity-level medium || true
          bandit -r src/ -f screen --severity-level medium

      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-sast-report
          path: security/bandit-report.json

  # Stage 4: SCA - Software Composition Analysis
  sca-scan:
    name: SCA (Safety)
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Safety
        run: pip install safety

      - name: Run dependency vulnerability scan
        run: |
          safety check -r requirements.txt --output json > security/safety-report.json || true
          safety check -r requirements.txt

      - name: Upload SCA report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-sca-report
          path: security/safety-report.json

  # Stage 5: Secret Detection
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stage 6: Container Build & Scan
  container-security:
    name: Container Build & Scan
    runs-on: ubuntu-latest
    needs: [unit-tests, sast-scan, sca-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -f docker/Dockerfile .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: "sarif"
          output: "security/trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "security/trivy-results.sarif"

      - name: Run Hadolint (Dockerfile linting)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile

  # Stage 7: Infrastructure as Code Scan
  iac-scan:
    name: IaC Security (Checkov)
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov IaC scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/terraform/
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,security/checkov-results.sarif

      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-iac-report
          path: security/checkov-results.sarif

  # Stage 8: Deploy (only on main branch)
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [container-security, iac-scan, secret-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "All security gates passed!"
          echo "Deploying ${{ env.IMAGE_NAME }}:${{ github.sha }} to staging..."
          # Add your deployment commands here
          # e.g., kubectl apply, terraform apply, AWS ECS update, etc.

      - name: Post-deployment health check
        run: |
          echo "Running post-deployment health checks..."
          # Add health check commands here
