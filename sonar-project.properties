# SonarQube Configuration
# Required metadata
sonar.projectKey=devsecops-project
sonar.projectName=DevSecOps Project
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Source encoding
sonar.sourceEncoding=UTF-8

# Java version
sonar.java.source=17
sonar.java.target=17

# Coverage - JaCoCo
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Exclusions (files to exclude from analysis)
sonar.exclusions=**/config/**,**/exception/**,**/model/**

# Test exclusions
sonar.test.exclusions=src/test/**

# Code duplication detection
sonar.cpd.minimumTokens=50
sonar.cpd.minimumLines=5

# Quality Gate
sonar.qualitygate.wait=true

# OWASP Dependency Check report path
sonar.dependencyCheck.reportPath=target/dependency-check-report.xml
sonar.dependencyCheck.htmlReportPath=target/dependency-check-report.html
